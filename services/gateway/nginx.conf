upstream auth_service {
    server auth-service:8001;
}

upstream report_service {
    server report-service:8002;
}

server {
    listen 80;
    server_name localhost;

    # Izinkan upload file hingga 10MB (bukti foto penemuan)
    client_max_body_size 10m;

    # ==================== Auth Service routes ====================
    # /auth/* → Auth Service (register, login, token, me, verify)
    location /auth/ {
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # /admin/users* → Auth Service (admin user management)
    # Harus SEBELUM /admin/ agar tidak tertangkap oleh report-service
    location /admin/users {
        proxy_pass http://auth_service/admin/users;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # /admin/users/{id}/* → Auth Service (toggle-active, reset-password)
    location ~ ^/admin/users/(.+)$ {
        proxy_pass http://auth_service/admin/users/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ==================== Report Service routes ====================
    # /reports/health → Report Service health check (harus sebelum /reports)
    location = /reports/health {
        proxy_pass http://report_service/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /reports* → Report Service
    location /reports {
        proxy_pass http://report_service/reports;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # /categories → Report Service
    location /categories {
        proxy_pass http://report_service/categories;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # /units → Report Service
    location /units {
        proxy_pass http://report_service/units;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # /notifications → Report Service
    location /notifications {
        proxy_pass http://report_service/notifications;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # /feedback → Report Service
    location /feedback {
        proxy_pass http://report_service/feedback;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # /admin/* → Report Service (stats, laporan)
    location /admin/ {
        proxy_pass http://report_service/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # /uploads/* → Report Service (bukti foto penemuan)
    location /uploads/ {
        proxy_pass http://report_service/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==================== Health check aggregator ====================
    location /health {
        default_type application/json;
        return 200 '{"status": "healthy", "service": "gateway"}';
    }

    # ==================== Frontend (static files) ====================
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
