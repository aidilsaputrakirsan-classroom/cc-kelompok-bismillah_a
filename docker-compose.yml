# ==============================================
# Docker Compose — Microservices Architecture
# LaporIn ITK — Tim Bismillah_A
# ==============================================
# Services:
# 1. auth-db: PostgreSQL untuk Auth Service
# 2. report-db: PostgreSQL untuk Report Service
# 3. auth-service: Authentication (port 8001)
# 4. report-service: Laporan CRUD (port 8002)
# 5. frontend: React app (port 3000)
# 6. gateway: Nginx reverse proxy (port 80)
# ==============================================
# Usage:
#   docker compose up --build -d
#   docker compose down
#   docker compose logs -f
# ==============================================

services:
  # ================================
  # DATABASES (Database per Service)
  # ================================
  auth-db:
    image: postgres:16-alpine
    container_name: laporin-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aditya221004
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - laporin_ms_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  report-db:
    image: postgres:16-alpine
    container_name: laporin-report-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: report_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aditya221004
    volumes:
      - report_db_data:/var/lib/postgresql/data
    networks:
      - laporin_ms_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d report_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ================================
  # BACKEND SERVICES
  # ================================
  auth-service:
    build: ./services/auth-service
    container_name: laporin-auth-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:aditya221004@auth-db:5432/auth_db
      SECRET_KEY: ${SECRET_KEY:-09e5d86538ca68c6b8a0bcdaea298fd6287b662a6a7b721a3b0e493f877483dc}
      ALGORITHM: HS256
      TOKEN_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: "http://localhost,http://localhost:5173,http://localhost:3000"
      SERVICE_NAME: auth-service
      LOG_LEVEL: INFO
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "auth-service"
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - laporin_ms_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  report-service:
    build: ./services/report-service
    container_name: laporin-report-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:aditya221004@report-db:5432/report_db
      AUTH_SERVICE_URL: http://auth-service:8001
      CORS_ORIGINS: "http://localhost,http://localhost:5173,http://localhost:3000"
      SERVICE_NAME: report-service
      LOG_LEVEL: INFO
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "report-service"
    depends_on:
      report-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - laporin_ms_net
    volumes:
      - report_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ================================
  # FRONTEND
  # ================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost
    container_name: laporin-frontend
    restart: unless-stopped
    networks:
      - laporin_ms_net
    depends_on:
      - auth-service
      - report-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 64M

  # ================================
  # API GATEWAY
  # ================================
  gateway:
    image: nginx:alpine
    container_name: laporin-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - laporin_ms_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 64M

# ================================
# VOLUMES
# ================================
volumes:
  auth_db_data:
    name: laporin-auth-db-data
  report_db_data:
    name: laporin-report-db-data
  report_uploads:
    name: laporin-report-uploads

# ================================
# NETWORKS
# ================================
networks:
  laporin_ms_net:
    name: laporin-microservices-network
    driver: bridge