server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ============================================================
    # SECURITY: Sembunyikan versi nginx dari header response
    # ============================================================
    server_tokens off;

    # ============================================================
    # GZIP COMPRESSION
    # Mengompres response agar transfer data lebih cepat
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ============================================================
    # SECURITY HEADERS
    # ============================================================
    # Mencegah website dimuat dalam iframe (Clickjacking protection)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Mencegah browser menebak tipe konten (MIME sniffing protection)
    add_header X-Content-Type-Options "nosniff" always;

    # Aktifkan perlindungan XSS di browser lama
    add_header X-XSS-Protection "1; mode=block" always;

    # Batasi informasi referrer yang dikirim
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================================
    # CATATAN MICROSERVICES:
    # Semua proxy API (auth, reports, dll) sudah ditangani oleh
    # Nginx Gateway (services/gateway/nginx.conf).
    # Frontend nginx hanya bertugas serve static React files.
    # ============================================================

    # ============================================================
    # SPA ROUTING
    # Semua route React diarahkan ke index.html
    # (wajib untuk React Router agar refresh halaman tidak 404)
    # ============================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    # STATIC ASSET CACHING
    # File JS/CSS/gambar di-cache 1 tahun (immutable)
    # ============================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html tidak di-cache agar update langsung terdeteksi
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ============================================================
    # CUSTOM ERROR PAGES
    # ============================================================
    error_page 404 /index.html;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}